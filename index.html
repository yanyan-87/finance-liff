<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記一筆</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F4F2;
      min-height: 100vh;
      padding: 16px 16px 40px;
    }
    .form {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .toggle-row {
      display: flex;
      padding: 12px 14px 0;
      gap: 8px;
    }
    .toggle {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle.active-expense { background: #FAECE7; color: #D85A30; }
    .toggle.active-income  { background: #E1F5EE; color: #0F6E56; }
    .toggle.inactive { background: #F5F4F2; color: #B0AEA8; }
    .section { padding: 14px 16px; }
    .s-label { font-size: 11px; color: #888780; margin-bottom: 8px; letter-spacing: 0.04em; }
    .divider { height: 0.5px; background: #E8E8E4; }
    .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat-chip {
      padding: 6px 11px;
      border-radius: 18px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #2C2C2A;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 0; }
    .tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: #F5F4F2;
      border: 1px solid #E0DED8;
      color: #5F5E5A;
      cursor: pointer;
      user-select: none;
    }
    .tag.more-tag { color: #B0AEA8; }
    .more-panel {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
      padding: 8px;
      background: #F5F4F2;
      border-radius: 8px;
    }
    .more-panel.open { display: flex; }
    .note-input {
      width: 100%;
      border: 1.5px solid #E0DED8;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #2C2C2A;
      background: transparent;
      outline: none;
    }
    .note-input:focus { border-color: #2C2C2A; }
    .amount-row { display: flex; align-items: center; gap: 6px; }
    .amount-prefix { font-size: 15px; color: #888780; }
    .amount-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 28px;
      font-weight: 600;
      color: #2C2C2A;
      background: transparent;
    }
    .amount-input::placeholder { color: #D0CEC8; }
    .pay-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .pay-chip {
      flex: 1;
      min-width: 60px;
      text-align: center;
      padding: 7px 4px;
      border-radius: 10px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #2C2C2A;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .pay-chip.pay-selected {
      border-color: #185FA5;
      background: #E6F1FB;
      color: #185FA5;
      font-weight: 500;
    }
    .pay-more {
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #888780;
      cursor: pointer;
      white-space: nowrap;
    }
    .pay-selected-hint {
      font-size: 11px;
      color: #185FA5;
      margin-bottom: 6px;
      display: none;
    }
    .dropdown {
      display: none;
      background: #fff;
      border: 1.5px solid #E0DED8;
      border-radius: 10px;
      overflow: hidden;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      color: #2C2C2A;
      border-bottom: 0.5px solid #F0EEE8;
      cursor: pointer;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item.item-selected {
      color: #185FA5;
      font-weight: 500;
      background: #F0F6FF;
    }
    .btn-submit {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #2C2C2A;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-submit:disabled { background: #C8C6C0; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2C2C2A;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="form">
  <div class="toggle-row">
    <div class="toggle active-expense" id="toggleExpense" onclick="switchMode('expense')">支出</div>
    <div class="toggle inactive" id="toggleIncome" onclick="switchMode('income')">收入</div>
  </div>

  <div class="section">
    <div class="s-label">分類</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="s-label">備註</div>
    <div class="tag-row" id="tagRow"></div>
    <div class="more-panel" id="morePanel"></div>
    <input class="note-input" id="noteInput" placeholder="輸入備註，下次自動記住" />
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="s-label">金額</div>
    <div class="amount-row">
      <div class="amount-prefix">NT$</div>
      <input class="amount-input" type="number" id="amountInput" placeholder="0" inputmode="numeric" />
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="s-label" id="payLabel">付款方式</div>
    <div class="pay-row" id="payRow"></div>
    <div class="pay-selected-hint" id="paySelectedHint"></div>
    <div class="dropdown" id="dropdown"></div>
  </div>
</div>

<button class="btn-submit" id="submitBtn" disabled onclick="handleSubmit()">確認記帳</button>
<div class="toast" id="toast"></div>

<script>
  const LIFF_ID = '2010535186-yYeXj3G2';
  const N8N_WEBHOOK = 'https://yan-n8n.zeabur.app/webhook/liff-expense';
  const MAX_VISIBLE_TAGS = 8;

  const EXPENSE_CATEGORIES = [
    { value: '餐費',     color: '#D85A30', bg: '#FAECE7', icon: '🍴' },
    { value: '交通',     color: '#185FA5', bg: '#E6F1FB', icon: '🚇' },
    { value: '購物',     color: '#993556', bg: '#FBEAF0', icon: '🛍️' },
    { value: '旅遊',     color: '#0F6E56', bg: '#E1F5EE', icon: '✈️' },
    { value: '娛樂',     color: '#534AB7', bg: '#EEEDFE', icon: '🎮' },
    { value: '保險',     color: '#5F5E5A', bg: '#F1EFE8', icon: '🛡️' },
    { value: '醫療',     color: '#A32D2D', bg: '#FCEBEB', icon: '🏥' },
    { value: '家用',     color: '#854F0B', bg: '#FAEEDA', icon: '🏠' },
    { value: '投資',     color: '#3B6D11', bg: '#EAF3DE', icon: '📈' },
    { value: '寵物',     color: '#B5752F', bg: '#FBF0E2', icon: '🐾' },
    { value: '負債還款', color: '#6B2E2E', bg: '#F6E7E5', icon: '💳' },
    { value: '學習',     color: '#1F5E5E', bg: '#E2F0F0', icon: '📚' },
    { value: '稅務孝親', color: '#6B4E9E', bg: '#F0E9F8', icon: '🙏' },
    { value: '其他',     color: '#5F5E5A', bg: '#F1EFE8', icon: '📋' },
  ];

  const INCOME_CATEGORIES = [
    { value: '薪資', color: '#0F6E56', bg: '#E1F5EE', icon: '💰' },
    { value: '投資', color: '#3B6D11', bg: '#EAF3DE', icon: '📈' },
  ];

  const EXPENSE_DEFAULTS = {
    '餐費': '中信信用卡', '交通': '國泰帳戶', '購物': '台新信用卡',
    '旅遊': '中信信用卡', '娛樂': '台新信用卡', '保險': '郵局信用卡',
    '醫療': '現金', '家用': '郵局帳戶', '投資': '新光帳戶',
    '寵物': '台新信用卡', '負債還款': '郵局帳戶', '學習': '台新信用卡',
    '稅務孝親': '郵局帳戶', '其他': '台新信用卡',
  };

  const EXPENSE_TOP3 = ['台新信用卡', '中信信用卡', '現金'];
  const EXPENSE_ALL  = ['台新信用卡','中信信用卡','現金','中信帳戶','郵局帳戶','台新帳戶','新光帳戶','LINE Bank','國泰帳戶','郵局信用卡','國泰信用卡'];
  const INCOME_TOP2  = ['中信帳戶', '郵局帳戶'];
  const INCOME_ALL   = ['中信帳戶','郵局帳戶','台新帳戶','新光帳戶','LINE Bank','國泰帳戶'];

  let mode = 'expense';
  let selectedCat = null;
  let selectedPayment = null;
  let lineUserId = null;

  function getTagData(cat) {
    try {
      const raw = localStorage.getItem('tags_v1_' + cat);
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  }

  function saveTagToStorage(cat, tag) {
    try {
      const data = getTagData(cat);
      data[tag] = (data[tag] || 0) + 1;
      localStorage.setItem('tags_v1_' + cat, JSON.stringify(data));
    } catch(e) { console.error('localStorage error', e); }
  }

  function getSortedTags(cat) {
    const data = getTagData(cat);
    return Object.entries(data)
      .sort((a, b) => b[1] - a[1])
      .map(e => e[0]);
  }

  document.getElementById('tagRow').addEventListener('click', function(e) {
  const tag = e.target.closest('.tag');
  if (tag && !tag.classList.contains('more-tag')) {
    const noteInput = document.getElementById('noteInput');
    noteInput.value = tag.dataset.tag;
    noteInput.focus();
  }
});

document.getElementById('morePanel').addEventListener('click', function(e) {
  const tag = e.target.closest('.tag');
  if (tag) {
    const noteInput = document.getElementById('noteInput');
    noteInput.value = tag.dataset.tag;
    noteInput.focus();
  }
});

  function renderCategories() {
    const cats = mode === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
    document.getElementById('catGrid').innerHTML = cats.map(c =>
      `<div class="cat-chip" data-value="${c.value}" data-color="${c.color}" data-bg="${c.bg}" onclick="selectCat(this)">${c.icon} ${c.value}</div>`
    ).join('');
    selectedCat = null;
    document.getElementById('tagRow').innerHTML = '';
    document.getElementById('morePanel').innerHTML = '';
    document.getElementById('morePanel').classList.remove('open');
    document.getElementById('noteInput').value = '';
    renderPayment();
    checkReady();
  }

  function selectCat(el) {
    document.querySelectorAll('.cat-chip').forEach(c => {
      c.style.borderColor = '#E0DED8';
      c.style.background = '';
      c.style.color = '#2C2C2A';
      c.style.fontWeight = '';
    });
    el.style.borderColor = el.dataset.color;
    el.style.background = el.dataset.bg;
    el.style.color = el.dataset.color;
    el.style.fontWeight = '500';
    selectedCat = el.dataset.value;

    const def = mode === 'expense' ? EXPENSE_DEFAULTS[selectedCat] : null;
    if (def) setPayment(def);

    renderTags();
    checkReady();
  }

  function renderTags() {
    const row = document.getElementById('tagRow');
    const panel = document.getElementById('morePanel');
    panel.classList.remove('open');
    panel.innerHTML = '';

    if (!selectedCat) { row.innerHTML = ''; return; }

    const sorted = getSortedTags(selectedCat);
    if (sorted.length === 0) { row.innerHTML = ''; return; }

    const visible = sorted.slice(0, MAX_VISIBLE_TAGS);
    const hidden = sorted.slice(MAX_VISIBLE_TAGS);

    row.innerHTML = visible.map(t =>
      `<div class="tag" data-tag="${t}">${t}</div>`
    ).join('');

    if (hidden.length > 0) {
      row.innerHTML += `<div class="tag more-tag" id="moreTagBtn">更多 ▾</div>`;
      panel.innerHTML = hidden.map(t =>
        `<div class="tag" data-tag="${t}">${t}</div>`
      ).join('');
      document.getElementById('moreTagBtn').addEventListener('click', () => {
        panel.classList.toggle('open');
      });
    }

    bindTagClicks();
  }

  function renderPayment() {
    const top = mode === 'expense' ? EXPENSE_TOP3 : INCOME_TOP2;
    const all  = mode === 'expense' ? EXPENSE_ALL  : INCOME_ALL;

    document.getElementById('payLabel').textContent = mode === 'expense' ? '付款方式' : '存入帳戶';

    document.getElementById('payRow').innerHTML = top.map(p =>
      `<div class="pay-chip" data-value="${p}" onclick="selectPayChip(this)">${p}</div>`
    ).join('') + `<div class="pay-more" onclick="toggleDropdown()">更多 ▾</div>`;

    document.getElementById('dropdown').innerHTML = all.map(p =>
      `<div class="dropdown-item" data-value="${p}" onclick="selectPayFromDropdown('${p}')">${p}</div>`
    ).join('');
    document.getElementById('dropdown').classList.remove('open');
    document.getElementById('paySelectedHint').style.display = 'none';
    selectedPayment = null;
  }

  function setPayment(val) {
    selectedPayment = val;
    const top = mode === 'expense' ? EXPENSE_TOP3 : INCOME_TOP2;

    document.querySelectorAll('.pay-chip').forEach(c => {
      c.classList.toggle('pay-selected', c.dataset.value === val);
    });
    document.querySelectorAll('.dropdown-item').forEach(c => {
      c.classList.toggle('item-selected', c.dataset.value === val);
    });

    const hint = document.getElementById('paySelectedHint');
    if (!top.includes(val)) {
      hint.textContent = `已選：${val}`;
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
    checkReady();
  }

  function selectPayChip(el) { setPayment(el.dataset.value); }

  function selectPayFromDropdown(val) {
    setPayment(val);
    document.getElementById('dropdown').classList.remove('open');
  }

  function toggleDropdown() {
    document.getElementById('dropdown').classList.toggle('open');
  }

  function switchMode(m) {
    mode = m;
    document.getElementById('toggleExpense').className = m === 'expense' ? 'toggle active-expense' : 'toggle inactive';
    document.getElementById('toggleIncome').className  = m === 'income'  ? 'toggle active-income'  : 'toggle inactive';
    renderCategories();
  }

  function checkReady() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    document.getElementById('submitBtn').disabled = !(selectedCat && amount > 0 && selectedPayment);
  }

  document.getElementById('amountInput').addEventListener('input', checkReady);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function handleSubmit() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    const note   = document.getElementById('noteInput').value.trim();
    const today  = new Date().toISOString().slice(0, 10);

    if (note && selectedCat) saveTagToStorage(selectedCat, note);

    const payload = {
      intent: mode === 'expense' ? '記錄支出' : '記錄收入',
      category: selectedCat,
      amount: amount,
      payment_method: selectedPayment,
      date: today,
      note: note || null,
      source: 'liff',
      userId: lineUserId
    };

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '送出中...';

    try {
      await fetch(N8N_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('✅ 完成！');
      setTimeout(() => liff.closeWindow(), 1500);
    } catch(err) {
      showToast('❌ 送出失敗，請重試');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '確認記帳';
    }
  }

  liff.init({ liffId: LIFF_ID }).then(() => {
    if (liff.isLoggedIn()) {
      liff.getProfile().then(p => { lineUserId = p.userId; });
    } else {
      liff.login();
    }
  }).catch(err => console.error(err));

  renderCategories();
</script>
</body>
</html>
