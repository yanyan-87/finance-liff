<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記一筆</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F4F2;
      min-height: 100vh;
      padding: 16px 16px 40px;
    }
    .form {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .toggle-row {
      display: flex;
      padding: 12px 14px 0;
      gap: 8px;
    }
    .toggle {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle.active-expense { background: #FAECE7; color: #D85A30; }
    .toggle.active-income  { background: #E1F5EE; color: #0F6E56; }
    .toggle.inactive { background: #F5F4F2; color: #B0AEA8; }
    .section { padding: 14px 16px; }
    .s-label { font-size: 11px; color: #888780; margin-bottom: 8px; letter-spacing: 0.04em; }
    .divider { height: 0.5px; background: #E8E8E4; }
    .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat-chip {
      padding: 6px 11px;
      border-radius: 18px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #2C2C2A;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 28px; }
    .tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: #F5F4F2;
      border: 1px solid #E0DED8;
      color: #5F5E5A;
      cursor: pointer;
      user-select: none;
    }
    .tag.more-tag { color: #B0AEA8; }
    .more-panel {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
      padding: 8px;
      background: #F5F4F2;
      border-radius: 8px;
    }
    .more-panel.open { display: flex; }
    .note-input {
      width: 100%;
      border: 1.5px solid #E0DED8;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #2C2C2A;
      background: transparent;
      outline: none;
    }
    .note-input:focus { border-color: #2C2C2A; }
    .amount-row { display: flex; align-items: center; gap: 6px; }
    .amount-prefix { font-size: 15px; color: #888780; }
    .amount-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 28px;
      font-weight: 600;
      color: #2C2C2A;
      background: transparent;
    }
    .amount-input::placeholder { color: #D0CEC8; }
    .pay-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pay-chip {
      flex: 1;
      min-width: 60px;
      text-align: center;
      padding: 7px 4px;
      border-radius: 10px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #2C2C2A;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .pay-more {
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 12px;
      border: 1.5px solid #E0DED8;
      color: #888780;
      cursor: pointer;
      white-space: nowrap;
    }
    .dropdown {
      display: none;
      background: #fff;
      border: 1.5px solid #E0DED8;
      border-radius: 10px;
      margin-top: 6px;
      overflow: hidden;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      color: #2C2C2A;
      border-bottom: 0.5px solid #F0EEE8;
      cursor: pointer;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #F5F4F2; }
    .btn-submit {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #2C2C2A;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-submit:disabled { background: #C8C6C0; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2C2C2A;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="form">
  <!-- 切換鈕 -->
  <div class="toggle-row">
    <div class="toggle active-expense" id="toggleExpense" onclick="switchMode('expense')">支出</div>
    <div class="toggle inactive" id="toggleIncome" onclick="switchMode('income')">收入</div>
  </div>

  <!-- 分類 -->
  <div class="section">
    <div class="s-label">分類</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- 備註 -->
  <div class="section">
    <div class="s-label">備註</div>
    <div class="tag-row" id="tagRow"></div>
    <div class="more-panel" id="morePanel"></div>
    <input class="note-input" id="noteInput" placeholder="輸入備註，下次自動記住" />
  </div>

  <div class="divider"></div>

  <!-- 金額 -->
  <div class="section">
    <div class="s-label">金額</div>
    <div class="amount-row">
      <div class="amount-prefix">NT$</div>
      <input class="amount-input" type="number" id="amountInput" placeholder="0" inputmode="numeric" />
    </div>
  </div>

  <div class="divider"></div>

  <!-- 付款方式 / 存入帳戶 -->
  <div class="section">
    <div class="s-label" id="payLabel">付款方式</div>
    <div class="pay-row" id="payRow"></div>
    <div class="dropdown" id="dropdown"></div>
  </div>
</div>

<button class="btn-submit" id="submitBtn" disabled onclick="handleSubmit()">確認記帳</button>
<div class="toast" id="toast"></div>

<script>
  const LIFF_ID = '2010535186-yYeXj3G2';
  const N8N_WEBHOOK = 'https://yan-n8n.zeabur.app/webhook/liff-expense';
  const MAX_VISIBLE_TAGS = 8;

  const EXPENSE_CATEGORIES = [
    { value: '餐費',     color: '#D85A30', bg: '#FAECE7', icon: '🍴' },
    { value: '交通',     color: '#185FA5', bg: '#E6F1FB', icon: '🚇' },
    { value: '購物',     color: '#993556', bg: '#FBEAF0', icon: '🛍️' },
    { value: '旅遊',     color: '#0F6E56', bg: '#E1F5EE', icon: '✈️' },
    { value: '娛樂',     color: '#534AB7', bg: '#EEEDFE', icon: '🎮' },
    { value: '保險',     color: '#5F5E5A', bg: '#F1EFE8', icon: '🛡️' },
    { value: '醫療',     color: '#A32D2D', bg: '#FCEBEB', icon: '🏥' },
    { value: '家用',     color: '#854F0B', bg: '#FAEEDA', icon: '🏠' },
    { value: '投資',     color: '#3B6D11', bg: '#EAF3DE', icon: '📈' },
    { value: '寵物',     color: '#B5752F', bg: '#FBF0E2', icon: '🐾' },
    { value: '負債還款', color: '#6B2E2E', bg: '#F6E7E5', icon: '💳' },
    { value: '學習',     color: '#1F5E5E', bg: '#E2F0F0', icon: '📚' },
    { value: '稅務孝親', color: '#6B4E9E', bg: '#F0E9F8', icon: '🙏' },
    { value: '其他',     color: '#5F5E5A', bg: '#F1EFE8', icon: '📋' },
  ];

  const INCOME_CATEGORIES = [
    { value: '薪資', color: '#0F6E56', bg: '#E1F5EE', icon: '💰' },
    { value: '投資', color: '#3B6D11', bg: '#EAF3DE', icon: '📈' },
  ];

  const EXPENSE_DEFAULTS = {
    '餐費': '中信信用卡', '交通': '國泰帳戶', '購物': '台新信用卡',
    '旅遊': '中信信用卡', '娛樂': '台新信用卡', '保險': '郵局信用卡',
    '醫療': '現金', '家用': '郵局帳戶', '投資': '新光帳戶',
    '寵物': '台新信用卡', '負債還款': '郵局帳戶', '學習': '台新信用卡',
    '稅務孝親': '郵局帳戶', '其他': '台新信用卡',
  };

  const EXPENSE_TOP3 = ['台新信用卡', '中信信用卡', '現金'];
  const EXPENSE_MORE = ['中信帳戶','郵局帳戶','台新帳戶','新光帳戶','LINE Bank','國泰帳戶','郵局信用卡','國泰信用卡'];

  const INCOME_TOP2 = ['中信帳戶', '郵局帳戶'];
  const INCOME_MORE = ['台新帳戶','新光帳戶','LINE Bank','國泰帳戶'];

  let mode = 'expense';
  let selectedCat = null;
  let selectedCatColor = '#2C2C2A';
  let selectedPayment = null;
  let lineUserId = null;

  // localStorage helpers
  function getTagData(cat) {
    try {
      return JSON.parse(localStorage.getItem('tags_' + cat) || '{}');
    } catch { return {}; }
  }
  function saveTag(cat, tag) {
    const data = getTagData(cat);
    data[tag] = (data[tag] || 0) + 1;
    localStorage.setItem('tags_' + cat, JSON.stringify(data));
  }
  function getSortedTags(cat) {
    const data = getTagData(cat);
    return Object.entries(data)
      .sort((a, b) => b[1] - a[1])
      .map(e => e[0]);
  }

  function renderCategories() {
    const cats = mode === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
    const grid = document.getElementById('catGrid');
    grid.innerHTML = cats.map(c =>
      `<div class="cat-chip" data-value="${c.value}" data-color="${c.color}" data-bg="${c.bg}"
        onclick="selectCat(this)" style="border-color:#E0DED8">
        ${c.icon} ${c.value}
      </div>`
    ).join('');
    selectedCat = null;
    selectedCatColor = '#2C2C2A';
    renderTags();
    renderPayment();
    checkReady();
  }

  function selectCat(el) {
    document.querySelectorAll('.cat-chip').forEach(c => {
      c.style.borderColor = '#E0DED8';
      c.style.background = '';
      c.style.color = '#2C2C2A';
      c.style.fontWeight = '';
    });
    const color = el.dataset.color;
    const bg = el.dataset.bg;
    el.style.borderColor = color;
    el.style.background = bg;
    el.style.color = color;
    el.style.fontWeight = '500';
    selectedCat = el.dataset.value;
    selectedCatColor = color;

    // 預設付款方式
    const def = mode === 'expense' ? EXPENSE_DEFAULTS[selectedCat] : null;
    if (def) setPayment(def);

    renderTags();
    checkReady();
  }

  function renderTags() {
    const row = document.getElementById('tagRow');
    const panel = document.getElementById('morePanel');
    panel.classList.remove('open');

    if (!selectedCat) { row.innerHTML = ''; return; }

    const sorted = getSortedTags(selectedCat);
    const visible = sorted.slice(0, MAX_VISIBLE_TAGS);
    const hidden = sorted.slice(MAX_VISIBLE_TAGS);

    row.innerHTML = visible.map(t =>
      `<div class="tag" onclick="selectTag('${t}')">${t}</div>`
    ).join('');

    if (hidden.length > 0) {
      row.innerHTML += `<div class="tag more-tag" onclick="toggleMoreTags()">更多 ▾</div>`;
      panel.innerHTML = hidden.map(t =>
        `<div class="tag" onclick="selectTag('${t}')">${t}</div>`
      ).join('');
    }
  }

  function toggleMoreTags() {
    document.getElementById('morePanel').classList.toggle('open');
  }

  function selectTag(t) {
    document.getElementById('noteInput').value = t;
  }

  function renderPayment() {
    const payLabel = document.getElementById('payLabel');
    const payRow = document.getElementById('payRow');
    const dropdown = document.getElementById('dropdown');

    if (mode === 'expense') {
      payLabel.textContent = '付款方式';
      const top3 = EXPENSE_TOP3;
      const more = EXPENSE_MORE;
      payRow.innerHTML = top3.map(p =>
        `<div class="pay-chip" data-value="${p}" onclick="selectPayChip(this)">${p}</div>`
      ).join('') + `<div class="pay-more" onclick="toggleDropdown()">更多 ▾</div>`;
      dropdown.innerHTML = more.map(p =>
        `<div class="dropdown-item" onclick="selectPayFromDropdown('${p}')">${p}</div>`
      ).join('');
    } else {
      payLabel.textContent = '存入帳戶';
      const top2 = INCOME_TOP2;
      const more = INCOME_MORE;
      payRow.innerHTML = top2.map(p =>
        `<div class="pay-chip" data-value="${p}" onclick="selectPayChip(this)">${p}</div>`
      ).join('') + `<div class="pay-more" onclick="toggleDropdown()">更多 ▾</div>`;
      dropdown.innerHTML = more.map(p =>
        `<div class="dropdown-item" onclick="selectPayFromDropdown('${p}')">${p}</div>`
      ).join('');
    }
    selectedPayment = null;
  }

  function setPayment(val) {
    selectedPayment = val;
    const chips = document.querySelectorAll('.pay-chip');
    chips.forEach(c => {
      c.style.borderColor = '#E0DED8';
      c.style.background = '';
      c.style.color = '#2C2C2A';
      c.style.fontWeight = '';
    });
    let found = false;
    chips.forEach(c => {
      if (c.dataset.value === val) {
        c.style.borderColor = '#185FA5';
        c.style.background = '#E6F1FB';
        c.style.color = '#185FA5';
        c.style.fontWeight = '500';
        found = true;
      }
    });
    if (!found) {
      // 從更多選的，顯示在第一個 chip
      const first = document.querySelector('.pay-chip');
      if (first) {
        first.dataset.value = val;
        first.textContent = val;
        first.style.borderColor = '#185FA5';
        first.style.background = '#E6F1FB';
        first.style.color = '#185FA5';
        first.style.fontWeight = '500';
      }
    }
  }

  function selectPayChip(el) {
    selectedPayment = el.dataset.value;
    setPayment(selectedPayment);
    checkReady();
  }

  function selectPayFromDropdown(val) {
    selectedPayment = val;
    setPayment(val);
    document.getElementById('dropdown').classList.remove('open');
    checkReady();
  }

  function toggleDropdown() {
    document.getElementById('dropdown').classList.toggle('open');
  }

  function switchMode(m) {
    mode = m;
    const e = document.getElementById('toggleExpense');
    const i = document.getElementById('toggleIncome');
    if (m === 'expense') {
      e.className = 'toggle active-expense';
      i.className = 'toggle inactive';
    } else {
      e.className = 'toggle inactive';
      i.className = 'toggle active-income';
    }
    renderCategories();
  }

  function checkReady() {
    const amount = document.getElementById('amountInput').value;
    document.getElementById('submitBtn').disabled = !(selectedCat && amount > 0 && selectedPayment);
  }

  document.getElementById('amountInput').addEventListener('input', checkReady);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function handleSubmit() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    const note = document.getElementById('noteInput').value.trim();
    const today = new Date().toISOString().slice(0, 10);

    if (note) saveTag(selectedCat, note);

    const payload = {
      intent: mode === 'expense' ? '記錄支出' : '記錄收入',
      category: selectedCat,
      amount: amount,
      payment_method: selectedPayment,
      date: today,
      note: note || null,
      source: 'liff',
      userId: lineUserId
    };

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '送出中...';

    try {
      await fetch(N8N_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('✅ 完成！');
      setTimeout(() => liff.closeWindow(), 1500);
    } catch (err) {
      showToast('❌ 送出失敗，請重試');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '確認記帳';
    }
  }

  liff.init({ liffId: LIFF_ID }).then(() => {
    if (liff.isLoggedIn()) {
      liff.getProfile().then(p => { lineUserId = p.userId; });
    } else {
      liff.login();
    }
  }).catch(err => console.error(err));

  // 初始化
  renderCategories();
</script>
</body>
</html>
